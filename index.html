<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <h1 id="heading">Real Time Character Counter</h1>
        <textarea  id="input" placeholder="Write Your Text here..." maxlength="100"></textarea>
        <div class="sub-container">
            <h2 class="h2">Total Characters: <span id="count">0</span></h2>
            <h2 class="h2">Remaining: <span id="remaining">100</span></h2>
        </div>
    </div>


    <script src="./script.js"></script>
</body>

</html>
